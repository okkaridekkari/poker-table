<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Game</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        #poker-root { 
            width: 100%; 
            max-width: 1200px; 
            height: 80vh; 
        }
    </style>
</head>
<body>
    <div id="poker-root"></div>

    <script>
        window.process = { env: { NODE_ENV: 'production' } };
    </script>

    <script type="module">
        import React from 'https://esm.sh/react@19';
        import ReactDOM from 'https://esm.sh/react-dom@19/client';
        import { Poker } from './poker-component.es.js';

        const targetContainer = document.getElementById('poker-root');

        if (Poker) {
            try {
                const root = ReactDOM.createRoot(targetContainer);
                root.render(React.createElement(Poker));
                console.log("Poker game successfully initialized via ES Modules!");
            } catch (renderError) {
                console.error("React module rendering failure:", renderError);
            }
        } else {
            console.error("Could not find the Poker export function inside your component module.");
        }
    </script>
</body>
</html>
