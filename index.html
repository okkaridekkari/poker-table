<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Game</title>
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #poker-root { width: 100%; max-width: 1200px; height: 80vh; }
    </style>
</head>
<body>
    <div id="poker-root"></div>

    <script>
        // FIXES: "Uncaught ReferenceError: process is not defined"
        // This simulates a safe environment object for the browser
        window.process = { env: { NODE_ENV: 'production' } };
    </script>

    <!-- Loads your compiled game logic -->
    <script src="./poker-component.umd.js"></script>
    <script>
        // FIXES: "window.PokerComponent.init is not a function"
        // We look for common alternative mount methods used by bundling tools
        const component = window.pokerComponent || window.PokerComponent || window.default;
        const targetElement = document.getElementById('poker-root');

        if (component) {
            if (typeof component.init === 'function') {
                component.init(targetElement);
            } else if (typeof component.render === 'function') {
                component.render(targetElement);
            } else if (typeof component === 'function') {
                // If the component itself is an initialization function
                component(targetElement);
            } else {
                console.log("Component loaded. Available functions:", Object.keys(component));
            }
        } else {
            console.error("Could not find the global component export variable.");
        }
    </script>
</body>
</html>
