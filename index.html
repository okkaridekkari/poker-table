<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Game</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        #poker-root { 
            width: 100%; 
            max-width: 1200px; 
            height: 80vh; 
        }
    </style>
    <!-- Alternative CDN provider without strict origin constraints -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
</head>
<body>
    <div id="poker-root"></div>

    <script>
        window.process = { env: { NODE_ENV: 'production' } };
    </script>

    <!-- Load your local component logic -->
    <script src="./poker-component.umd.js"></script>

    <script>
        const componentContainer = window.pokerComponent || window.PokerComponent || window;
        const PokerElement = componentContainer.Poker;
        const targetContainer = document.getElementById('poker-root');

        if (PokerElement) {
            try {
                // Ensure ReactDOM loaded from the backup scripts successfully
                if (typeof ReactDOM !== 'undefined') {
                    const root = ReactDOM.createRoot(targetContainer);
                    root.render(React.createElement(PokerElement));
                    console.log("Poker game canvas successfully mounted!");
                } else {
                    console.error("React engines failed to download over network options.");
                }
            } catch (renderError) {
                console.error("React mounting pipeline failed:", renderError);
            }
        } else {
            console.error("Failed to extract the Poker function from the library bindings configuration.");
        }
    </script>
</body>
</html>
